<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeFrame – Live Stock Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
</head>
<body>
  <header>
    <h1>TradeFrame</h1>
    <p id="last-updated">Fetching data…</p>
  </header>
  <main>
    <section id="summary" class="card"></section>
    <section id="chart-container" class="card">
      <canvas id="price-chart"></canvas>
    </section>
    <section id="table-container" class="card"></section>
  </main>
  <footer>
    <p>Data provided by Twelve Data (demo key)</p>
  </footer>
  <script type="module" src="js/app.js"></script>
</body>
</html>
